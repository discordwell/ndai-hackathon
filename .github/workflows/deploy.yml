name: Deploy TrustKit

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ndai
          POSTGRES_PASSWORD: ndai
          POSTGRES_DB: ndai
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Install and build frontend
        run: cd frontend && npm install && npm run build

      - name: Run unit tests
        run: pytest tests/unit/ -q
        env:
          DATABASE_URL: postgresql+asyncpg://ndai:ndai@localhost:5432/ndai

      - name: Run E2E tests
        run: pytest tests/e2e/ -q
        env:
          DATABASE_URL: postgresql+asyncpg://ndai:ndai@localhost:5432/ndai

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ovh2 via SSH
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          port: 41022
          command_timeout: 8m
          script: |
            cd /opt/trustkit
            git fetch origin
            git pull --ff-only origin main
            source .venv/bin/activate
            pip install -e ".[dev]" -q 2>/dev/null
            cd frontend && npm install --silent && npm run build 2>&1 | tail -1 && cd ..
            alembic upgrade head 2>&1 | tail -3
            sudo systemctl restart trustkit
            sleep 2
            curl -sf http://localhost:8100/health > /dev/null && echo "Deployed $(git rev-parse --short HEAD) at $(date)" || echo "DEPLOY FAILED"

      - name: Reboot ovh2 via OVH API (SSH failed)
        if: steps.ssh_deploy.outcome == 'failure'
        env:
          OVH_APP_KEY: ${{ secrets.OVH_APP_KEY }}
          OVH_APP_SECRET: ${{ secrets.OVH_APP_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
        run: |
          echo "::warning::SSH deploy failed — rebooting ovh2 via OVH API"
          VPS="vps-05030f8b.vps.ovh.us"
          API="https://api.us.ovhcloud.com/1.0"
          TSTAMP=$(curl -s "${API}/auth/time")
          URL="${API}/vps/${VPS}/reboot"
          SIG="\$1\$$(echo -n "${OVH_APP_SECRET}+${OVH_CONSUMER_KEY}+POST+${URL}++${TSTAMP}" | sha1sum | cut -d' ' -f1)"
          curl -s -X POST \
            -H "X-Ovh-Application: ${OVH_APP_KEY}" \
            -H "X-Ovh-Timestamp: ${TSTAMP}" \
            -H "X-Ovh-Signature: ${SIG}" \
            -H "X-Ovh-Consumer: ${OVH_CONSUMER_KEY}" \
            -H "Content-Type: application/json" \
            "${URL}"
          echo "Waiting 90s for server to come back..."
          sleep 90

      - name: Retry deploy after reboot
        if: steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH2_HOST }}
          username: ${{ secrets.OVH2_USER }}
          key: ${{ secrets.OVH2_KEY }}
          port: 41022
          command_timeout: 8m
          script: |
            cd /opt/trustkit
            git fetch origin
            git pull --ff-only origin main
            source .venv/bin/activate
            pip install -e ".[dev]" -q 2>/dev/null
            cd frontend && npm install --silent && npm run build 2>&1 | tail -1 && cd ..
            alembic upgrade head 2>&1 | tail -3
            sudo systemctl restart trustkit
            sleep 2
            curl -sf http://localhost:8100/health > /dev/null && echo "Deployed $(git rev-parse --short HEAD) at $(date) (after reboot)" || echo "DEPLOY FAILED"
