[program:google-chrome]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/google-chrome-stable --user-data-dir=/home/neko/.config/chrome-cdp --remote-debugging-port=9223 --remote-debugging-address=0.0.0.0 --remote-allow-origins=* --window-position=0,0 --display=%(ENV_DISPLAY)s --no-first-run --start-maximized --force-dark-mode --disable-file-system --disable-gpu --disable-software-rasterizer --disable-dev-shm-usage --enable-automation --disable-background-timer-throttling --disable-backgrounding-occluded-windows --disable-renderer-backgrounding --force-devtools-available --disable-features=TranslateUI,VizDisplayCompositor --disable-ipc-flooding-protection --enable-blink-features=IdleDetection --no-sandbox
stopsignal=INT
autorestart=true
priority=800
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/google-chrome.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

[program:openbox]
environment=HOME="/home/%(ENV_USER)s",USER="%(ENV_USER)s",DISPLAY="%(ENV_DISPLAY)s"
command=/usr/bin/openbox --config-file /etc/neko/openbox.xml
autorestart=true
priority=300
user=%(ENV_USER)s
stdout_logfile=/var/log/neko/openbox.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
redirect_stderr=true

[program:nginx-cdp]
command=/usr/sbin/nginx -g "daemon off;"
autorestart=true
priority=900
stdout_logfile=/var/log/neko/nginx-cdp.log
stdout_logfile_maxbytes=10MB
redirect_stderr=true
