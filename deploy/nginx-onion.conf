# Nginx config for NDAI .onion hidden service
# Hardened: no IP logging, no proxy headers, security headers

server {
    listen 80;
    # server_name is the .onion address (set after first tor startup)

    # Disable all access logging — we genuinely don't want to know
    access_log off;
    error_log /var/log/nginx/ndai-onion-error.log crit;

    # Strip all proxy identifying headers
    proxy_set_header X-Real-IP "";
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Forwarded-Proto "";
    proxy_set_header Host $host;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve frontend static files directly
    location /assets/ {
        alias /opt/ndai/frontend/dist/assets/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
